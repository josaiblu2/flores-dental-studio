<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Netlify Form Detection Shadow</title>
</head>
<body>
  <form name="contacto_floresdental" data-netlify="true" hidden>
    <input type="text" name="nombre" />
    <input type="tel" name="telefono" />
    <input type="email" name="email" />
    
    <select name="servicio_interes">
      <option value="Limpieza y Prevención"></option>
      <option value="Consulta de Valoración / Diagnóstico"></option>
      <option value="Resinas y Restauraciones"></option>
      <option value="Blanqueamiento Dental"></option>
      <option value="Urgencia Dental / Dolor"></option>
      <option value="Otros"></option>
    </select>

    <textarea name="mensaje"></textarea>
    
    <input type="checkbox" name="privacidad" />
    
    <input type="hidden" name="form-name" value="contacto_floresdental" />
  </form>
</body>
</html>
